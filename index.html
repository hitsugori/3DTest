<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DTest</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #fff; }
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 40px 40px; z-index: 0; pointer-events: none;
  }
  canvas { display: block; width: 100vw !important; height: 100vh !important; outline: none; touch-action: none; position: relative; z-index: 1; }
  #loader {
    position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    background: #000; z-index: 9999; transition: opacity 0.4s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  #loader h1 { font-size: 2rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
  #loader p { font-size: 0.85rem; color: rgba(255,255,255,0.5); letter-spacing: 0.05em; }
  .spinner {
    width: 42px; height: 42px; border: 2px solid rgba(255,255,255,0.15); border-top: 2px solid #fff;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #no-webgpu { display: none; position: fixed; inset: 0; align-items: center; justify-content: center; background: #000; z-index: 10000; }
  #no-webgpu.show { display: flex; }
  #no-webgpu .box {
    max-width: 460px; padding: 36px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px); border-radius: 16px; text-align: center;
  }
  #no-webgpu h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 14px; }
  #no-webgpu p { font-size: 0.9rem; line-height: 1.6; color: rgba(255,255,255,0.6); }
  #no-webgpu a { color: #fff; text-decoration: underline; opacity: 0.8; }
  #no-webgpu a:hover { opacity: 1; }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <h1>3DTest</h1>
  <p>Initializing WebGPU Renderer</p>
</div>

<div id="no-webgpu">
  <div class="box">
    <h2>WebGPU Not Supported</h2>
    <p>
      Your browser does not support WebGPU.<br><br>
      Use Chrome 113+, Edge 113+, or Firefox 141
      with <code>dom.webgpu.enabled</code> enabled.<br><br>
      <a href="https://caniuse.com/webgpu" target="_blank" rel="noopener">
        Check browser support →
      </a>
    </p>
  </div>
</div>

<script>
(function() {
  if (!navigator.gpu) return;
  const allowedLimits = new Set([
    "maxTextureDimension1D","maxTextureDimension2D","maxTextureDimension3D",
    "maxTextureArrayLayers","maxBindGroups","maxBindGroupsPlusVertexBuffers",
    "maxBindingsPerBindGroup","maxDynamicUniformBuffersPerPipelineLayout",
    "maxDynamicStorageBuffersPerPipelineLayout","maxSampledTexturesPerShaderStage",
    "maxSamplersPerShaderStage","maxStorageBuffersPerShaderStage",
    "maxStorageTexturesPerShaderStage","maxUniformBuffersPerShaderStage",
    "maxUniformBufferBindingSize","maxStorageBufferBindingSize",
    "minUniformBufferOffsetAlignment","minStorageBufferOffsetAlignment",
    "maxVertexBuffers","maxBufferSize","maxVertexAttributes",
    "maxVertexBufferArrayStride","maxInterStageShaderVariables",
    "maxColorAttachments","maxColorAttachmentBytesPerSample",
    "maxComputeWorkgroupStorageSize","maxComputeInvocationsPerWorkgroup",
    "maxComputeWorkgroupSizeX","maxComputeWorkgroupSizeY","maxComputeWorkgroupSizeZ",
    "maxComputeWorkgroupsPerDimension"
  ]);

  function patchAdapter(adapter) {
    if (!adapter) return adapter;
    const originalRequest = adapter.requestDevice;
    adapter.requestDevice = function(descriptor) {
      if (descriptor && descriptor.requiredLimits) {
        const cleaned = {};
        for (let key in descriptor.requiredLimits) {
          if (allowedLimits.has(key)) cleaned[key] = descriptor.requiredLimits[key];
        }
        descriptor = Object.assign({}, descriptor, { requiredLimits: cleaned });
      }
      return originalRequest.call(adapter, descriptor);
    };
    return adapter;
  }

  const originalRequestAdapter = navigator.gpu.requestAdapter;
  navigator.gpu.requestAdapter = async function(options) {
    return patchAdapter(await originalRequestAdapter.call(navigator.gpu, options));
  };
})();
</script>

<script type="module">
  const loader = document.getElementById('loader');
  const noWebgpu = document.getElementById('no-webgpu');

  if (!navigator.gpu) {
    loader.classList.add('hidden');
    noWebgpu.classList.add('show');
  } else {
    try {
      const module = await import('./threedtest.js');
      await module.default('./threedtest_bg.wasm');
      setTimeout(() => loader.classList.add('hidden'), 200);
    } catch (err) {
      console.error('3DTest init error:', err);
      loader.innerHTML = `<div style="text-align:center;padding:24px"><strong style="font-size:1rem;">Failed to load 3DTest</strong><br><small style="opacity:0.5">${err.message ?? err}</small></div>`;
    }
  }
</script>

</body>
</html>
